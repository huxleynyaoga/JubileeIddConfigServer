server:
  port: 8888

spring:
  application:
    name: ConfigServer
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Note: Ensure the path is correct (3 slashes for file:///)
          search-locations: file:///D:/Jubilee/config-server/config-repo/
    # Helps prevent startup crashes if there are version mismatches
    compatibility-verifier:
      enabled: false

  # 1. ADD SECURITY
  security:
    user:
      name: ${CONFIG_USER:jubilee_admin}
      password: ${CONFIG_PWD:secret123}

# 2. ADD LOGGING FOR THE SERVER ITSELF
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    org.springframework.cloud.config.server: DEBUG
    org.springframework.security: WARN

# 3. ADD MANAGEMENT (Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always

# 4. ADD SWAGGER (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html